maf_dir: .maf
default_validation_profile: default

agents:
  claude:
    command:
      - claude
      - -p
      - --allowedTools
      - "Bash,Edit,Write,Read,Glob,Grep,WebFetch,WebSearch"
      - --no-session-persistence
    timeout_s: 1800
  codex:
    command:
      - codex
      - exec
      - --skip-git-repo-check
      - "-"
    timeout_s: 1800
  gemini:
    command:
      - gemini
      - -p
      - ""
    timeout_s: 1800
  gemini-research:
    command:
      - gemini
      - -p
      - ""
    timeout_s: 1800
  codex-research:
    command:
      - codex
      - exec
      - --skip-git-repo-check
      - --full-auto
      - --search
      - "-"
    timeout_s: 1800

research:
  worker_focuses:
    - architecture
    - domain-model
    - risks-and-edge-cases
  max_workers: 3

deep_research:
  worker_focuses:
    - foundational-sources
    - supporting-evidence
    - counterarguments
    - implementation-precedent
  max_workers: 4
  iterations: 3

validation_profiles:
  default:
    commands:
      - pytest
      - npm test

